# WealthOS - Supabase Local Development Config
# Docs: https://supabase.com/docs/guides/cli/config

[project]
id = "hmwdfcsxtmbzlslxgqus"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/api/auth/callback", "http://localhost:3000/reset-password"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Oniefy: Confirme seu e-mail"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Oniefy: Redefinir sua senha"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "Oniefy: Confirme seu novo e-mail"
content_path = "./supabase/templates/email_change.html"

[auth.mfa]
enabled = true
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"

[storage]
enabled = true
file_size_limit = "10MB"

[realtime]
enabled = true
