# ============================================================
# Post-Deploy Health Check
#
# Roda automaticamente após cada deploy da Vercel.
# Também pode ser disparado manualmente para qualquer URL.
#
# Trigger automático: Vercel GitHub Integration envia
# deployment_status quando o deploy termina.
#
# Trigger manual: Actions → Run workflow → informar URL.
# ============================================================

name: Post-Deploy Check

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL para testar (ex: https://oniefy.com)"
        required: true
        default: "https://oniefy.com"
      run_e2e:
        description: "Rodar Smoke E2E? (mais lento, ~3min)"
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: "20"

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    # Para deployment_status: só roda quando deploy foi sucesso
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Determinar URL alvo
      # NOTA: URLs *.vercel.app têm SSO protection mesmo para deploys de produção.
      # Para production, sempre usar o domínio custom (oniefy.com).
      - name: Resolve target URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.target_url }}" >> $GITHUB_OUTPUT
          else
            # deployment_status: usar domínio custom para produção
            ENV="${{ github.event.deployment_status.environment }}"
            if [ "$ENV" = "Production" ] || [ "$ENV" = "production" ]; then
              echo "target=https://www.oniefy.com" >> $GITHUB_OUTPUT
            else
              # Preview: usar URL do evento (SSO pode bloquear, aceitável)
              URL="${{ github.event.deployment_status.environment_url }}"
              if [ -z "$URL" ]; then
                URL="https://www.oniefy.com"
              fi
              echo "target=$URL" >> $GITHUB_OUTPUT
            fi
          fi

      # Aguardar propagação (Vercel edge pode levar alguns segundos)
      - name: Wait for deployment propagation
        run: |
          echo "Aguardando 15s para propagação do deploy..."
          sleep 15
          echo "Testando ${{ steps.url.outputs.target }}"

      - name: Run health check
        run: node scripts/healthcheck.mjs --base ${{ steps.url.outputs.target }}

  smoke-e2e:
    name: Smoke E2E (post-deploy)
    runs-on: ubuntu-latest
    needs: [health-check]
    if: >
      github.event_name == 'workflow_dispatch' && inputs.run_e2e == true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Resolve target URL
        id: url
        run: echo "target=${{ inputs.target_url }}" >> $GITHUB_OUTPUT

      - name: Run smoke tests against deploy
        run: npx playwright test smoke.spec.ts --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.url.outputs.target }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SERVICE_ROLE_KEY }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 14
