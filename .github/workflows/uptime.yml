# ============================================================
# Uptime Monitor
#
# DESABILITADO em 26/03/2026: cron schedule removido para
# economizar minutos do GitHub Actions (free tier: 2000 min/mês).
# Mantém workflow_dispatch para execução manual quando necessário.
#
# Reativar quando: GitHub Pro ativado ou base > 50 usuários.
# Alternativa: UptimeRobot (free tier, não consome GitHub minutes).
# ============================================================

name: Uptime Monitor

on:
  workflow_dispatch:

env:
  PRODUCTION_URL: "https://www.oniefy.com"

jobs:
  monitor:
    name: Production Health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run health check
        id: health
        run: |
          node scripts/healthcheck.mjs --base ${{ env.PRODUCTION_URL }} 2>&1 | tee /tmp/healthcheck.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create issue on failure
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/healthcheck.log', 'utf8');
            const now = new Date().toISOString().split('T')[0];

            // Verificar se já existe issue aberta de uptime
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime-alert',
              per_page: 1,
            });

            if (issues.data.length > 0) {
              // Adicionar comentário na issue existente
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `## Falha recorrente — ${now}\n\n\`\`\`\n${log}\n\`\`\``,
              });
            } else {
              // Criar nova issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Uptime] Health check falhou — ${now}`,
                body: `O health check de produção falhou.\n\n**URL:** ${process.env.PRODUCTION_URL}\n**Horário:** ${new Date().toISOString()}\n\n\`\`\`\n${log}\n\`\`\`\n\n### Próximos passos\n1. Verificar se Vercel está respondendo\n2. Verificar se Supabase está ativo\n3. Rodar \`npm run healthcheck -- --base ${process.env.PRODUCTION_URL}\` localmente`,
                labels: ['uptime-alert', 'bug'],
              });
            }
