name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  security-check:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secret key in frontend
        run: |
          echo "Checking for secret key leaks in frontend code..."
          if grep -r "ONIEFY_DB_SECRET\|service_role" \
            --include="*.tsx" --include="*.ts" \
            src/app src/components src/lib/supabase/client.ts 2>/dev/null | \
            grep -v "server.ts" | \
            grep -v "admin.ts" | \
            grep -v "// " | \
            grep -v "node_modules"; then
            echo "ERROR: secret key reference found in frontend code!"
            exit 1
          fi
          echo "OK: No secret key leaks detected."

      - name: Check RLS enabled on all tables
        run: |
          echo "Checking migration file for RLS enablement..."
          TABLES=$(grep "CREATE TABLE " supabase/migrations/001_initial_schema.sql | \
            sed 's/CREATE TABLE //' | sed 's/ (.*//' | sort)
          RLS_TABLES=$(grep "ENABLE ROW LEVEL SECURITY" supabase/migrations/001_initial_schema.sql | \
            sed 's/ALTER TABLE //' | sed 's/ ENABLE.*//' | sort)
          
          MISSING=$(comm -23 <(echo "$TABLES") <(echo "$RLS_TABLES"))
          if [ -n "$MISSING" ]; then
            echo "ERROR: Tables without RLS:"
            echo "$MISSING"
            exit 1
          fi
          echo "OK: All tables have RLS enabled."

      - name: Dependency audit (advisory only)
        run: npm audit --omit=dev || true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Generate SBOM (CycloneDX)
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json --output-format JSON

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Jest
        run: npm test -- --ci --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ONIEFY_DB_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_ONIEFY_DB_KEY: "placeholder-key"

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ vars.E2E_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          NEXT_PUBLIC_ONIEFY_DB_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_ONIEFY_DB_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          ONIEFY_DB_SECRET: ${{ secrets.E2E_SERVICE_ROLE_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
